<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Bahan Baku</title>
    <style>
        /* Menggunakan system-ui agar rapi tanpa perlu CDN Font eksternal */
        :root {
            --primary-color: #0d6efd;
            --primary-hover: #0b5ed7;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #212529;
            --border-color: #dee2e6;
            --error-color: #dc3545;
            --success-bg: #d1e7dd;
            --success-text: #0f5132;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        .card-header {
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .card-header h2 {
            margin: 0;
            font-size: 24px;
            color: var(--primary-color);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        .optional-badge {
            font-size: 11px;
            color: #6c757d;
            font-weight: normal;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.25);
        }

        select {
            width: 100%;
            padding: 10px 12px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.2s;
            background-color: white;
            font-family: inherit;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.25);
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: var(--primary-color);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        .message-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 15px;
            line-height: 1.5;
        }

        .message-error {
            background-color: #f8d7da;
            color: var(--error-color);
            border: 1px solid #f5c2c7;
            display: block;
        }

        .message-success {
            background-color: #f1f3f5;
            color: var(--text-color);
            border: none;
            display: block;
        }

        .result-detail {
            font-size: 13px;
            margin-top: 8px;
            opacity: 0.8;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="card-header">
            <h2 id="judulMode">Perhitungan Reguler</h2>
        </div>

        <div class="form-group">
            <label for="tipePerhitungan">Pilih Mode Perhitungan</label>
            <select id="tipePerhitungan" onchange="gantiMode()">
                <option value="reguler">Reguler</option>
                <option value="sampling">Sampling</option>
            </select>
        </div>

        <div class="form-group">
            <label for="jumlahSak" id="labelJumlahSak">1. Jumlah Sak *</label>
            <input type="number" id="jumlahSak" placeholder="Contoh: 100" min="0" step="any">
        </div>

        <!-- Grup Input Khusus Reguler -->
        <div id="grupReguler">
            <div class="form-group">
                <label for="beratBahan">2. Berat Bahan (per sak) *</label>
                <input type="number" id="beratBahan" placeholder="Contoh: 25" min="0" step="any">
            </div>

            <div class="form-group">
                <label for="beratPembungkus">3. Berat Pembungkus/Sak *</label>
                <input type="number" id="beratPembungkus" placeholder="Contoh: 1.18" min="0" step="any">
            </div>
        </div>

        <!-- Grup Input Khusus Sampling (Disembunyikan secara default) -->
        <div id="grupSampling" style="display: none;">
            <div class="form-group">
                <label for="beratSampling">2. Berat Sampling *</label>
                <input type="number" id="beratSampling" placeholder="Contoh: 25.5" min="0" step="any">
            </div>
        </div>

        <div class="form-group">
            <label for="jumlahPalet" id="labelJumlahPalet">4. Jumlah Palet <span class="optional-badge">(Opsional)</span></label>
            <input type="number" id="jumlahPalet" placeholder="Contoh: 5" min="0" step="any">
        </div>

        <div class="form-group">
            <label for="beratPalet" id="labelBeratPalet">5. Berat Palet *</label>
            <input type="number" id="beratPalet" placeholder="Contoh: 16.68" min="0" step="any">
        </div>

        <button onclick="hitungTotal()">Hitung</button>

        <!-- Tempat menampilkan pesan error atau hasil -->
        <div id="pesanArea" class="message-box"></div>
    </div>

    <script>
        // Fungsi untuk mengganti tampilan form berdasarkan pilihan dropdown
        function gantiMode() {
            const mode = document.getElementById('tipePerhitungan').value;
            const judul = document.getElementById('judulMode');
            const grupReguler = document.getElementById('grupReguler');
            const grupSampling = document.getElementById('grupSampling');
            const labelJumlahPalet = document.getElementById('labelJumlahPalet');
            const labelBeratPalet = document.getElementById('labelBeratPalet');
            const pesanArea = document.getElementById('pesanArea');

            // Sembunyikan hasil/pesan error saat mode diubah
            pesanArea.className = "message-box"; 

            if (mode === 'reguler') {
                judul.innerText = "Perhitungan Reguler";
                grupReguler.style.display = "block";
                grupSampling.style.display = "none";
                labelJumlahPalet.innerHTML = '4. Jumlah Palet <span class="optional-badge">(Opsional)</span>';
                labelBeratPalet.innerText = '5. Berat Palet *';
            } else {
                judul.innerText = "Perhitungan Sampling";
                grupReguler.style.display = "none";
                grupSampling.style.display = "block";
                // Update urutan nomor label untuk mode sampling
                labelJumlahPalet.innerHTML = '3. Jumlah Palet <span class="optional-badge">(Opsional)</span>';
                labelBeratPalet.innerText = '4. Berat Palet *';
            }
        }

        function hitungTotal() {
            // Cek mode perhitungan saat ini
            const mode = document.getElementById('tipePerhitungan').value;

            // Mengambil nilai dari input text field yang sama di kedua mode
            const strJumlahSak = document.getElementById('jumlahSak').value;
            const strJumlahPalet = document.getElementById('jumlahPalet').value;
            const strBeratPalet = document.getElementById('beratPalet').value;

            const pesanArea = document.getElementById('pesanArea');

            // Fungsi utilitas format 2 desimal
            const formatNum = (num) => num.toLocaleString('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            // Fungsi utilitas format 4 desimal khusus berat sampling
            const formatNum4 = (num) => num.toLocaleString('id-ID', { minimumFractionDigits: 4, maximumFractionDigits: 4 });

            if (mode === 'reguler') {
                const strBeratBahan = document.getElementById('beratBahan').value;
                const strBeratPembungkus = document.getElementById('beratPembungkus').value;

                // Validasi Mode Reguler
                if (strJumlahSak === "" || strBeratBahan === "" || strBeratPembungkus === "" || strBeratPalet === "") {
                    pesanArea.className = "message-box message-error";
                    pesanArea.innerHTML = "<strong>Gagal:</strong> Harap isi semua form yang memiliki tanda bintang (*)!";
                    return;
                }

                const jumlahSak = parseFloat(strJumlahSak);
                const beratBahan = parseFloat(strBeratBahan);
                const beratPembungkus = parseFloat(strBeratPembungkus);
                const beratPalet = parseFloat(strBeratPalet);
                const jumlahPalet = strJumlahPalet === "" ? 0 : parseFloat(strJumlahPalet);

                const totalBeratBahan = beratBahan * jumlahSak;
                const totalBeratPembungkus = beratPembungkus * jumlahSak;
                const totalBeratPalet = jumlahPalet * beratPalet;
                const totalAkhir = totalBeratBahan + totalBeratPembungkus + totalBeratPalet;

                let detailHTML = `
                    1. Jumlah Sak : ${jumlahSak} Sak<br>
                    2. Berat Sak &nbsp;&nbsp;: ${jumlahSak} &times; ${formatNum(beratPembungkus)} Kg = ${formatNum(totalBeratPembungkus)} Kg<br>
                `;

                // Cek jika jumlah dan berat palet 0, maka sembunyikan rincian palet
                if (jumlahPalet === 0 && beratPalet === 0) {
                    detailHTML += `3. Berat Total &nbsp;: (${jumlahSak} &times; ${beratBahan} Kg) + ${formatNum(totalBeratPembungkus)} Kg<br>`;
                } else {
                    detailHTML += `
                        3. Jumlah Pallet: ${jumlahPalet}<br>
                        4. Berat Pallet : ${jumlahPalet} &times; ${formatNum(beratPalet)} Kg = ${formatNum(totalBeratPalet)} Kg<br>
                        5. Berat Total &nbsp;: (${jumlahSak} &times; ${beratBahan} Kg) + ${formatNum(totalBeratPembungkus)} Kg + ${formatNum(totalBeratPalet)} Kg<br>
                    `;
                }

                pesanArea.className = "message-box message-success";
                pesanArea.innerHTML = `
                    <div style="font-family: inherit; font-size: 15px; line-height: 1.6;">
                        ${detailHTML}
                        <div style="font-size: 18px; font-weight: bold; margin-top: 5px; margin-left: 105px;">
                            ${formatNum(totalAkhir)} Kg
                        </div>
                    </div>
                `;
            } else if (mode === 'sampling') {
                const strBeratSampling = document.getElementById('beratSampling').value;

                // Validasi Mode Sampling
                if (strJumlahSak === "" || strBeratSampling === "" || strBeratPalet === "") {
                    pesanArea.className = "message-box message-error";
                    pesanArea.innerHTML = "<strong>Gagal:</strong> Harap isi semua form yang memiliki tanda bintang (*)!";
                    return;
                }

                const jumlahSak = parseFloat(strJumlahSak);
                const beratSampling = parseFloat(strBeratSampling);
                const beratPalet = parseFloat(strBeratPalet);
                const jumlahPalet = strJumlahPalet === "" ? 0 : parseFloat(strJumlahPalet);

                const totalBeratSampling = beratSampling * jumlahSak;
                const totalBeratPalet = jumlahPalet * beratPalet;
                const totalAkhir = totalBeratSampling + totalBeratPalet;

                let detailHTML = `
                    1. Jumlah Sak : ${jumlahSak} Sak<br>
                    2. Berat Sampling: ${jumlahSak} &times; ${formatNum4(beratSampling)} Kg = ${formatNum(totalBeratSampling)} Kg<br>
                `;

                // Cek jika jumlah dan berat palet 0, maka sembunyikan rincian palet
                if (jumlahPalet === 0 && beratPalet === 0) {
                    detailHTML += `3. Berat Total &nbsp;: ${formatNum(totalBeratSampling)} Kg<br>`;
                } else {
                    detailHTML += `
                        3. Jumlah Pallet: ${jumlahPalet}<br>
                        4. Berat Pallet : ${jumlahPalet} &times; ${formatNum(beratPalet)} Kg = ${formatNum(totalBeratPalet)} Kg<br>
                        5. Berat Total &nbsp;: ${formatNum(totalBeratSampling)} Kg + ${formatNum(totalBeratPalet)} Kg<br>
                    `;
                }

                pesanArea.className = "message-box message-success";
                pesanArea.innerHTML = `
                    <div style="font-family: inherit; font-size: 15px; line-height: 1.6;">
                        ${detailHTML}
                        <div style="font-size: 18px; font-weight: bold; margin-top: 5px; margin-left: 105px;">
                            ${formatNum(totalAkhir)} Kg
                        </div>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
